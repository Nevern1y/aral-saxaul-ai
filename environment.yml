# ============================================================================
# Aral Saxaul AI — Conda environment for all 5 phases
# ============================================================================
#
# RTX 3080 10GB VRAM · 32GB RAM · Windows 10/11
#
# QUICK START (run in PowerShell or Anaconda Prompt as Administrator):
#
#   1. Install Miniconda if you haven't already:
#        winget install -e --id Anaconda.Miniconda3
#
#   2. Create the environment:
#        conda env create -f environment.yml
#
#   3. Activate it:
#        conda activate aral-saxaul
#
#   4. Verify GPU is visible to XGBoost:
#        python -c "import xgboost as xgb; print(xgb.build_info()['USE_CUDA'])"
#      Should print: True
#
#   5. Authenticate with Google Earth Engine (once):
#        python -c "import ee; ee.Authenticate()"
#
# TROUBLESHOOTING:
#   - If GDAL DLL errors appear:  conda install -c conda-forge gdal libgdal --force-reinstall
#   - If XGBoost can't see GPU:   make sure NVIDIA Game-Ready or Studio drivers ≥ 545.x are installed
#   - On Windows, DO NOT mix conda-forge packages with pip-installed gdal/rasterio.
#     Stick to conda-forge for the entire geo-stack.
# ============================================================================

name: aral-saxaul

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core ────────────────────────────────────────────────────────────
  - python=3.12.*
  - pip
  - setuptools
  - wheel

  # ── Numerical & Scientific ──────────────────────────────────────────
  - numpy>=2.0,<3.0
  - scipy>=1.14
  - pandas>=2.2

  # ── Machine Learning ────────────────────────────────────────────────
  # xgboost from conda-forge ships with GPU support (CUDA backend).
  # At runtime, tree_method='hist' + device='cuda' will use the RTX 3080.
  - xgboost>=2.1
  - scikit-learn>=1.5
  - optuna>=4.0
  - shap>=0.46

  # ── Geospatial Stack (CRITICAL: all from conda-forge to avoid DLL hell) ─
  - gdal>=3.9
  - geos>=3.12
  - proj>=9.4
  - rasterio>=1.4
  - geopandas>=1.0
  - fiona>=1.9
  - shapely>=2.0
  - pyproj>=3.7
  - rtree>=1.3
  - xarray>=2024.6
  - rioxarray>=0.17
  - netcdf4>=1.7

  # ── Google Earth Engine (Python SDK) ─────────────────────────────────
  - earthengine-api>=1.4
  - geemap>=0.34

  # ── Visualisation ───────────────────────────────────────────────────
  - matplotlib>=3.9
  - seaborn>=0.13
  - folium>=0.18
  - branca>=0.8

  # ── Dashboard ───────────────────────────────────────────────────────
  - streamlit>=1.35

  # ── Utilities ───────────────────────────────────────────────────────
  - tqdm>=4.66
  - joblib>=1.4
  - pyyaml>=6.0

  # ── Development (optional but recommended) ──────────────────────────
  - ipython>=8.0
  - jupyterlab>=4.2
  - black>=24.0

  # ── Pip-only packages (no conda-forge build available, or pinned version) ─
  - pip:
    - optuna-integration>=4.0
